version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: messhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-messhub}
      POSTGRES_USER: ${POSTGRES_USER:-messhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-messhub}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: golang:1.23-alpine
    container_name: messhub-backend
    working_dir: /app/backend
    command: sh -c "go mod download && go run ./cmd/api"
    environment:
      APP_ENV: ${APP_ENV:-development}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-messhub}:${POSTGRES_PASSWORD:-messhub}@postgres:5432/${POSTGRES_DB:-messhub}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_EXPIRES_IN_HOURS: ${JWT_EXPIRES_IN_HOURS:-72}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - .:/app
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    container_name: messhub-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-MessHub}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/app
    depends_on:
      - backend

volumes:
  postgres-data:
