name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy main to VPS
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Deploy backend + frontend
        working-directory: /home/ubuntu/projects/messhub
        run: |
          set -Eeuo pipefail

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          export PATH="$HOME/.local/bin:$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | sort -V | tail -1)/bin:/usr/local/go/bin:$PATH"

          PROJECT_DIR="/home/ubuntu/projects/messhub"

          cd "$PROJECT_DIR"
          git checkout main
          git pull --ff-only origin main
          echo "✅ Code updated to $(git rev-parse --short HEAD)"

          cd backend
          go run ./cmd/migrate
          gas build --no-ui --type go --pm2-name messhub-backend --port 4100 --yes

          cd ../frontend
          gas build --no-ui --type svelte --pm2-name messhub-frontend --port 4101 --yes

          curl --fail --silent --show-error http://127.0.0.1:4100/health
          curl --fail --silent --show-error http://127.0.0.1:4101/login | grep -q "MessHub"

          pm2 save
          echo "✅ Deploy complete"
